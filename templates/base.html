<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="SciBot — AI-powered science experiment recommender for curious minds." />
  <title>{% block title %}SciBot — Science Experiment Recommender{% endblock %}</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Exo+2:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap"
    rel="stylesheet"
  />

  <!-- Stylesheet -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  {% block head %}{% endblock %}
</head>
<body>
  <!-- ───────── Animated Background Particles ───────── -->
  <div class="bg-particles" id="bgParticles">
    <div class="particle" style="left: 10%; animation-delay: 0s;"></div>
    <div class="particle" style="left: 30%; animation-delay: 2s;"></div>
    <div class="particle" style="left: 50%; animation-delay: 4s;"></div>
    <div class="particle" style="left: 70%; animation-delay: 6s;"></div>
    <div class="particle" style="left: 90%; animation-delay: 8s;"></div>
    <div class="particle" style="left: 20%; animation-delay: 1s;"></div>
    <div class="particle" style="left: 60%; animation-delay: 3s;"></div>
    <div class="particle" style="left: 80%; animation-delay: 5s;"></div>
  </div>

  <!-- ───────── Navigation ───────── -->
  <nav class="navbar" id="mainNav">
    <a href="/" class="nav-logo" id="navLogo">
      <span class="logo-icon">⚗️</span>
      <span class="logo-text">Sci<span class="accent">Bot</span></span>
    </a>

    <div class="nav-controls">
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle light/dark theme">🌙</button>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
    </div>

    <ul class="nav-links" id="navLinks">
      <li><a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}" id="linkHome">💬 Chatbot</a></li>
      <li><a href="/explorer" class="nav-link {% if request.path == '/explorer' %}active{% endif %}" id="linkExplorer">🔬 Explorer</a></li>
      <li><a href="/ingredient-lab" class="nav-link {% if request.path == '/ingredient-lab' %}active{% endif %}" id="linkIngredient">🧪 Ingredient Lab</a></li>
    </ul>
  </nav>

  <!-- ───────── Page Content ───────── -->
  <main class="page-content">
    {% block content %}{% endblock %}
  </main>



  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
