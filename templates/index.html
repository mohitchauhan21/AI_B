{% extends "base.html" %}
{% block title %}SciBot — AI Chatbot{% endblock %}

{% block content %}
<section class="chat-section" id="chatSection">

  <!-- ── Model Config Panel ── -->
  <div class="config-panel" id="configPanel">
    <button class="config-toggle" id="configToggle" aria-label="Toggle model settings">
      ⚙️ <span>Model Config</span>
      <svg class="chevron" viewBox="0 0 24 24" width="18" height="18"><polyline points="6 9 12 15 18 9" fill="none" stroke="currentColor" stroke-width="2"/></svg>
    </button>
    <div class="config-body" id="configBody">
      <div class="config-row">
        <label for="tempSlider">
          Temperature
          <span class="tooltip" data-tip="Controls randomness. Lower = more focused; Higher = more creative.">ℹ️</span>
        </label>
        <input type="range" id="tempSlider" min="0" max="1" step="0.05" value="0.7" />
        <output id="tempValue">0.70</output>
      </div>
      <div class="config-row">
        <label for="topPSlider">
          Top-p
          <span class="tooltip" data-tip="Nucleus sampling. Lower = fewer token choices; Higher = more diverse.">ℹ️</span>
        </label>
        <input type="range" id="topPSlider" min="0" max="1" step="0.05" value="0.9" />
        <output id="topPValue">0.90</output>
      </div>
    </div>
  </div>

  <!-- ── Chat Window ── -->
  <div class="chat-window" id="chatWindow">
    <!-- Welcome message -->
    <div class="msg bot" id="welcomeMsg">
      <div class="msg-avatar">🤖</div>
      <div class="msg-bubble">
        <p>Hey there, future scientist! 🔬 I'm <strong>SciBot</strong>.</p>
        <p>Ask me about any science experiment — I'll walk you through the materials, steps, safety tips, and the science behind it!</p>
      </div>
    </div>
  </div>

  <!-- ── Chat Input ── -->
  <form class="chat-input-bar" id="chatForm" autocomplete="off">
    <textarea id="chatInput" placeholder="Ask SciBot about a science experiment…" rows="1"></textarea>
    <button type="submit" class="send-btn" id="sendBtn" aria-label="Send message">
      <svg viewBox="0 0 24 24" width="22" height="22"><path d="M2 21l21-9L2 3v7l15 2-15 2z" fill="currentColor"/></svg>
    </button>
  </form>
</section>
{% endblock %}
